<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Պատվերի կառավարում | Aramazd Art</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-wrap">
  <aside class="admin-side">
    <img src="assets/logo/aramazd-logo-white.png" alt="Aramazd Art">
    <a href="admin.html">← Բոլոր պատվերները</a>
    <a href="account/index.html">👤 Իմ սրահը</a>
    <a href="index.html">← Կայք</a>
    <button onclick="logoutAdmin()">Դուրս գալ</button>
  </aside>

  <main class="admin-main">
    <span class="label">ARAMAZD ART</span>
    <h1>Պատվերի կառավարում</h1>
    <div id="orderBox">Բեռնվում է...</div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>

<script>
let order=null;

function money(n){
  return Number(n||0).toLocaleString('hy-AM')+' դր․';
}

function id(){
  return new URLSearchParams(location.search).get('id');
}

async function checkAdmin(){
  const session=await Aramazd.getSession();
  if(!session){
    location.href='login.html?next=admin-order.html?id='+id();
    return;
  }

  const profile=await Aramazd.ensureProfile(session.user);

  if(profile?.role!=='admin'){
    alert('Այս էջը միայն ադմինի համար է։');
    location.href='account/index.html';
    return;
  }

  await loadOrder();
}

async function loadOrder(){
  const {data,error}=await aramazdClient
    .from('orders')
    .select('*')
    .eq('id',id())
    .single();

  if(error){
    document.getElementById('orderBox').innerHTML='Սխալ՝ '+error.message;
    return;
  }

  order=data;
  renderOrder();
}

function renderOrder(){
  const d=order.details||{};

  document.getElementById('orderBox').innerHTML=`
    <div class="pay-box">
      <h2>#AA-${order.id} — ${order.product||''}</h2>
      <p><b>Հաճախորդ․</b> ${order.customer_name||''}</p>
      <p><b>Հեռախոս․</b> ${order.phone||''}</p>
      <p><b>Email․</b> ${d.customer_email||''}</p>
    </div>

    <div class="pay-box">
      <h2>Երեխայի / պատվերի տվյալներ</h2>
      <p><b>Երեխայի անուն․</b> ${d.child_name||''}</p>
      <p><b>Տարիք․</b> ${d.age||''}</p>
      <p><b>Սեռ․</b> ${d.gender||''}</p>
      <p><b>Ընտրված հեքիաթ․</b> ${d.selected_story||''}</p>
      <p><b>Նկարների քանակ․</b> ${d.uploaded_count||0}</p>
      <p><b>Նշումներ․</b> ${d.notes||''}</p>
    </div>

    <div class="pay-box">
      <h2>Առաքման տվյալներ</h2>
      <p><b>Ստացող․</b> ${order.recipient_name||''}</p>
      <p><b>Հեռախոս․</b> ${order.delivery_phone||''}</p>
      <p><b>Քաղաք / գյուղ․</b> ${order.delivery_city||''}</p>
      <p><b>Հասցե․</b> ${order.delivery_address||''}</p>
      <p><b>Ինդեքս․</b> ${order.postal_code||''}</p>
      <p><b>Նշում․</b> ${order.delivery_note||''}</p>
    </div>

    <div class="pay-box">
      <h2>Կարգավիճակ և վճարում</h2>

      <label>Կարգավիճակ
        <select id="status">
          ${[
            'Նոր պատվեր',
            'Տվյալները ստացվել են',
            'Հեքիաթը գրվում է',
            'Իլյուստրացիաների փուլ',
            'Դիզայնի փուլ',
            'Տպագրություն',
            'Պատրաստ է',
            'Առաքում',
            'Առաքված',
            'Ավարտված'
          ].map(s=>`<option ${s===(order.status||'')?'selected':''}>${s}</option>`).join('')}
        </select>
      </label>

      <label>Վճարված գումար
        <input id="paid" type="number" value="${order.paid_amount||0}">
      </label>

      <p><b>Ընդհանուր․</b> ${money(order.price)}</p>
      <p><b>Մնացած․</b> ${money(Math.max(Number(order.price||0)-Number(order.paid_amount||0),0))}</p>
      <p><b>Վճարման վիճակ․</b> ${order.payment_status||'Չհաստատված'}</p>
    </div>

    <div class="pay-box">
      <h2>Ֆայլեր հաճախորդի համար</h2>

      <label>PDF հղում
        <input id="pdf_url" value="${order.pdf_url||''}" placeholder="https://...">
      </label>

      <label>Մուլտֆիլմ / Video հղում
        <input id="video_url" value="${order.video_url||''}" placeholder="https://...">
      </label>

      <label>NFC հղում
        <input id="nfc_url" value="${order.nfc_url||''}" placeholder="https://...">
      </label>

      <label>Preview նկարի հղում
        <input id="preview_url" value="${order.preview_url||''}" placeholder="https://...">
      </label>
    </div>

    <div class="pay-box">
      <h2>Առաքում</h2>

      <label>Առաքման ընկերություն
        <input id="delivery_company" value="${order.delivery_company||''}" placeholder="ՀայՓոստ / Onex / Globbing">
      </label>

      <label>Tracking code
        <input id="tracking_code" value="${order.tracking_code||''}">
      </label>

      <label>Նշում ադմինի համար
        <textarea id="admin_note">${order.admin_note||''}</textarea>
      </label>
    </div>

    <button class="btn" onclick="saveOrder()">Պահպանել փոփոխությունները</button>
  `;
}

async function saveOrder(){
  const paid=Number(document.getElementById('paid').value||0);
  let payment_status='Չհաստատված';

  if(paid>0 && paid<Number(order.price||0)){
    payment_status='Կանխավճար ստացված';
  }

  if(paid>=Number(order.price||0)){
    payment_status='Ամբողջությամբ վճարված';
  }

  const updates={
    status:document.getElementById('status').value,
    paid_amount:paid,
    payment_status,
    pdf_url:document.getElementById('pdf_url').value,
    video_url:document.getElementById('video_url').value,
    nfc_url:document.getElementById('nfc_url').value,
    preview_url:document.getElementById('preview_url').value,
    delivery_company:document.getElementById('delivery_company').value,
    tracking_code:document.getElementById('tracking_code').value,
    admin_note:document.getElementById('admin_note').value
  };

  const {error}=await aramazdClient
    .from('orders')
    .update(updates)
    .eq('id',order.id);

  if(error){
    alert('Սխալ․ '+error.message);
    return;
  }

  alert('Պահպանվեց ✅');
  await loadOrder();
}

async function logoutAdmin(){
  await aramazdClient.auth.signOut();
  location.href='login.html';
}

document.addEventListener('DOMContentLoaded',checkAdmin);
</script>

</body>
</html>
