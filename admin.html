<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Aramazd Art</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="admin-wrap">
  <aside class="admin-side">
    <img src="assets/logo/aramazd-logo-white.png" alt="Aramazd Art">
    <a class="active" href="admin.html">🏠 Admin Dashboard</a>
    <a href="account/index.html">👤 Իմ սրահը</a>
    <a href="index.html">← Կայք</a>
    <button onclick="logoutAdmin()">Դուրս գալ</button>
  </aside>
  <main class="admin-main">
    <span class="label">ARAMAZD ART</span>
    <h1>Admin Panel</h1>
    <p>Այստեղ երևում են բոլոր պատվերները։ Կարող եք փոխել կարգավիճակը, վճարման տվյալները և նշումներ ավելացնել։</p>
    <div class="admin-grid">
      <div class="stat"><b id="aAll">0</b><span>Բոլոր պատվերները</span></div>
      <div class="stat"><b id="aNew">0</b><span>Նոր պատվեր</span></div>
      <div class="stat"><b id="aIncome">0 դր․</b><span>Վճարված գումար</span></div>
      <div class="stat"><b id="aDebt">0 դր․</b><span>Մնացորդ</span></div>
    </div>
    <div class="pay-box">
      <input id="search" placeholder="Որոնել անունով, հեռախոսով կամ ապրանքով" style="width:100%;padding:14px;border-radius:14px;border:1px solid #ddd" oninput="renderOrders()">
    </div>
    <div style="overflow:auto">
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Հաճախորդ</th><th>Ապրանք</th><th>Գին</th><th>Վճարված</th><th>Կարգավիճակ</th><th>Գործողություն</th></tr></thead>
        <tbody id="adminOrders"><tr><td colspan="7">Բեռնվում է...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
let adminOrders=[];
function money(n){return Number(n||0).toLocaleString('hy-AM')+' դր․'}
async function checkAdmin(){
 const session=await Aramazd.getSession();
 if(!session){location.href='login.html?next=admin.html';return;}
 const profile=await Aramazd.ensureProfile(session.user);
 if(profile?.role!=='admin'){
   alert('Այս էջը միայն ադմինի համար է։');
   location.href='account/index.html';
   return;
 }
 loadOrders();
}
async function loadOrders(){
 const {data,error}=await aramazdClient.from('orders').select('*').order('created_at',{ascending:false});
 if(error){document.getElementById('adminOrders').innerHTML='<tr><td colspan="7">Սխալ՝ '+error.message+'</td></tr>';return;}
 adminOrders=data||[];
 renderStats(); renderOrders();
}
function renderStats(){
 document.getElementById('aAll').textContent=adminOrders.length;
 document.getElementById('aNew').textContent=adminOrders.filter(o=>(o.status||'').includes('Նոր')).length;
 document.getElementById('aIncome').textContent=money(adminOrders.reduce((s,o)=>s+Number(o.paid_amount||0),0));
 document.getElementById('aDebt').textContent=money(adminOrders.reduce((s,o)=>s+Math.max(Number(o.price||0)-Number(o.paid_amount||0),0),0));
}
function renderOrders(){
 const q=(document.getElementById('search')?.value||'').toLowerCase();
 const rows=adminOrders.filter(o=>JSON.stringify(o).toLowerCase().includes(q));
 document.getElementById('adminOrders').innerHTML=rows.map(o=>`
 <tr>
  <td>#AA-${o.id}</td>
  <td>${o.customer_name||''}<br><small>${o.phone||''}</small></td>
  <td>${o.product||''}</td>
  <td>${money(o.price)}</td>
  <td><input type="number" id="paid_${o.id}" value="${o.paid_amount||0}" style="width:95px"></td>
  <td><select id="status_${o.id}">
    ${['Նոր պատվեր','Տվյալները ստացվել են','Հեքիաթը գրվում է','Իլյուստրացիաների փուլ','Դիզայնի փուլ','Տպագրություն','Պատրաստ է','Առաքում','Առաքված','Ավարտված'].map(s=>`<option ${s===(o.status||'')?'selected':''}>${s}</option>`).join('')}
  </select></td>
  <td><button class="mini-btn" onclick="saveOrder(${o.id})">Պահպանել</button></td>
 </tr>`).join('') || '<tr><td colspan="7">Պատվերներ չկան</td></tr>';
}
async function saveOrder(id){
 const paid=Number(document.getElementById('paid_'+id).value||0);
 const status=document.getElementById('status_'+id).value;
 const order=adminOrders.find(o=>o.id===id);
 const payment_status=paid<=0?'unpaid':(paid>=Number(order.price||0)?'paid':'deposit_paid');
 const {error}=await aramazdClient.from('orders').update({paid_amount:paid,status,payment_status}).eq('id',id);
 if(error){alert('Սխալ։ '+error.message);return;}
 alert('Պահպանվեց ✅'); await loadOrders();
}
async function logoutAdmin(){await aramazdClient.auth.signOut();location.href='login.html';}
document.addEventListener('DOMContentLoaded',checkAdmin);
</script>
</body>
</html>
