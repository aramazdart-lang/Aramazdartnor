<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Վճարում | Aramazd Art</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html"><img src="assets/logo/aramazd-logo.png" alt="Aramazd Art"></a>
  <nav class="nav"><a href="index.html">Գլխավոր</a><a href="products.html">Ապրանքներ</a><a href="account/index.html">Իմ սրահը</a><a href="contact.html">Կապ</a></nav>
</header>
<main class="checkout-page">
  <section class="checkout-card">
    <span class="label">CHECKOUT</span>
    <h1>Վճարման փուլ</h1>
    <p>Այս պահին վճարման պատուհանը demo է։ Երբ IDBank/Idram/VPOS-ը տրամադրի տվյալները, այս կոճակը կկապվի իրական վճարման էջին։</p>
    <div id="checkoutInfo">Բեռնվում է...</div>
    <button class="btn" id="payBtn">Վճարել և հաստատել պատվերը</button>
    <p class="muted">Demo տարբերակում կոճակը պատվերը գրանցում է Supabase-ում՝ որպես վճարված կանխավճար։</p>
  </section>
</main>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/checkout.js"></script>
<script>
(async function(){
  const session = await Aramazd.getSession();
  if(!session){ location.href = 'login.html?next=checkout.html'; return; }
  const draft = AramazdCheckout.getDraft();
  const box = document.getElementById('checkoutInfo');
  const btn = document.getElementById('payBtn');
  if(!draft){
    box.innerHTML = '<p>Պատվերի տվյալներ չկան։ Վերադարձեք ապրանքի էջ և նորից սեղմեք պատվիրել։</p>';
    btn.disabled = true;
    return;
  }
  box.innerHTML = `
    <div class="pay-box">
      <h2>${draft.product}</h2>
      <p><b>Ընդհանուր արժեք․</b> ${Aramazd.money(draft.price)}</p>
      <p><b>Վճարման ենթակա հիմա․</b> ${Aramazd.money(draft.deposit || draft.price)}</p>
      <p><b>Մնացորդ․</b> ${Aramazd.money(Math.max((draft.price||0)-(draft.deposit||draft.price),0))}</p>
    </div>`;
  btn.onclick = async function(){
    btn.disabled = true; btn.textContent = 'Գրանցվում է...';
    try{
      const order = await AramazdCheckout.createOrderFromDraft();
      alert('Պատվերը գրանցվեց ✅');
      location.href = 'account/index.html?order=' + order.id;
    }catch(e){
      alert('Սխալ։ ' + e.message);
      btn.disabled = false; btn.textContent = 'Վճարել և հաստատել պատվերը';
    }
  };
})();
</script>
</body>
</html>
